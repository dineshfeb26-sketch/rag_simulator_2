<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Simulator</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.13);
      --text: #ecf7ff;
      --muted: #9bb2c7;
      --accent: #55e6c1;
      --accent-2: #8b5cf6;
      --warning: #ffd166;
      --danger: #ff6b6b;
      --line: rgba(255, 255, 255, 0.18);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(85, 230, 193, 0.25), transparent 30%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.25), transparent 30%),
        linear-gradient(135deg, #07111f 0%, #0b1630 45%, #0b1020 100%);
      min-height: 100vh;
      padding: 28px;
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .intro {
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      right: -80px;
      top: -80px;
      background: radial-gradient(circle, rgba(85, 230, 193, 0.28), transparent 65%);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.95;
      margin: 0 0 16px;
      letter-spacing: -0.05em;
    }

    .gradient {
      background: linear-gradient(90deg, var(--accent), #79a7ff, var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      max-width: 760px;
      margin: 0;
    }

    .quick-explain {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .metric {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .metric span:first-child {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(85, 230, 193, 0.25), rgba(139, 92, 246, 0.25));
      font-size: 22px;
    }

    .metric strong {
      display: block;
      font-size: 14px;
    }

    .metric small {
      display: block;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }

    .workspace {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 22px;
    }

    .control-panel {
      padding: 22px;
      position: sticky;
      top: 20px;
      align-self: start;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font: inherit;
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }

    textarea {
      min-height: 210px;
      resize: vertical;
      line-height: 1.55;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: rgba(85, 230, 193, 0.8);
      box-shadow: 0 0 0 4px rgba(85, 230, 193, 0.12);
      background: rgba(0, 0, 0, 0.32);
    }

    .field {
      margin-bottom: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 800;
      color: #06111f;
      background: linear-gradient(135deg, var(--accent), #79a7ff);
      box-shadow: 0 14px 28px rgba(85, 230, 193, 0.18);
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: none;
    }

    .pipeline {
      display: grid;
      gap: 18px;
    }

    .step {
      padding: 22px;
      overflow: hidden;
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .step-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(85, 230, 193, 0.25), rgba(139, 92, 246, 0.25));
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: var(--accent);
      font-weight: 900;
    }

    h2 {
      font-size: 19px;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .pill {
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      white-space: nowrap;
    }

    .explain {
      color: var(--muted);
      line-height: 1.55;
      margin: -4px 0 16px;
      font-size: 14px;
    }

    .chunks,
    .retrieved {
      display: grid;
      gap: 12px;
    }

    .chunk {
      padding: 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
    }

    .chunk.selected {
      border-color: rgba(85, 230, 193, 0.7);
      background: rgba(85, 230, 193, 0.1);
    }

    .chunk-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .chunk-title {
      font-weight: 900;
      color: var(--accent);
      font-size: 13px;
    }

    .score {
      font-size: 12px;
      color: var(--warning);
      font-weight: 800;
    }

    .chunk p {
      margin: 0;
      color: #d7e9f8;
      line-height: 1.55;
      font-size: 14px;
    }

    .embedding-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }

      padding: 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0,
